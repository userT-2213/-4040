name: Run Python Script

# mainブランチにコードがプッシュ（保存）されたときに実行する設定
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # これを入れておくと、ボタンをポチッと押して手動で実行できるようになります

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    # 1. あなたのリポジトリにあるコードをGitHubのサーバーに連れてくる
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Pythonを動かせる環境を準備する
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 使いたいPythonのバージョン

    # 3. 実際にPythonファイルを動かす
    - name: Run Python script
      run: |
        python あなたのファイル名.py
